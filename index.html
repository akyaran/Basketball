<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0f1419" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Basketball Prototype</title>
    <link rel="manifest" href="manifest.json?v=0.11.1" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
    <link rel="stylesheet" href="styles.css?v=0.11.1" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="1対1バスケットボールゲーム"></canvas>

      <section class="hud top-hud" aria-label="ゲーム情報">
        <div class="score">
          <span id="playerScore">0</span>
          <small>YOU</small>
          <span class="dash">-</span>
          <small>CPU</small>
          <span id="cpuScore">0</span>
        </div>
        <div class="shot-clock">
          <small>24</small>
          <strong id="shotClock">24.0</strong>
        </div>
        <div class="mode-switch" role="group" aria-label="シュート方式">
          <button id="aimMode" type="button">AIM</button>
          <button id="timingMode" class="active" type="button">TIMING</button>
        </div>
        <button id="homeButton" class="home-button" type="button">HOME</button>
        <button id="pauseButton" class="pause-button" type="button" aria-label="Pause" aria-pressed="false" title="Pause">||</button>
        <button id="slowToggle" class="slow-toggle" type="button" aria-pressed="false">SLOW OFF</button>
      </section>

      <section class="hud side-hud" aria-label="状態">
        <div>
          <small>TIME</small>
          <strong id="gameClock">2:00</strong>
        </div>
        <div>
          <small>SHOT</small>
          <strong id="shotReadout">Hold</strong>
        </div>
        <div>
          <small>SPACE</small>
          <strong id="spaceReadout">Open</strong>
        </div>
        <div>
          <small>STAMINA</small>
          <strong id="staminaReadout">100%</strong>
        </div>
      </section>

      <div id="joystick" class="joystick" aria-hidden="true">
        <div id="stick" class="stick"></div>
      </div>

      <div class="action-pad" aria-label="アクション">
        <button id="screenButton" class="icon-button screen-button" type="button" aria-label="スクリーン">SCREEN</button>
        <button id="dashButton" class="icon-button" type="button" aria-label="ダッシュ">↯</button>
        <button id="passButton" class="icon-button pass-button" type="button" aria-label="パス">PASS</button>
        <button id="shootButton" class="shoot-button" type="button" aria-label="シュート">SHOT</button>
      </div>

      <div id="meter" class="meter" aria-hidden="true">
        <div class="sweet"></div>
        <div id="needle" class="needle"></div>
      </div>

      <div id="toast" class="toast">Ready</div>
      <div id="celebration" class="celebration" aria-live="polite" aria-hidden="true" hidden>
        <strong id="celebrationText" class="celebration-text">DUNK!</strong>
        <span id="celebrationDetail" class="celebration-detail">2 POINTS</span>
      </div>
      <div id="versionBadge" class="version-badge">v0.11.1</div>

      <section id="titleScreen" class="title-screen" aria-label="タイトル">
        <div class="title-panel">
          <p class="kicker">1v1 / 2v2 / 3v3 / 5v5 Prototype</p>
          <h1>Basketball</h1>
          <p id="titleVersion" class="title-version">v0.11.1</p>
          <div class="title-actions">
            <button id="startButton" class="primary-button" type="button">START</button>
            <button id="settingsButton" class="secondary-button" type="button">SETTINGS</button>
          </div>
        </div>
      </section>

      <section id="settingsPanel" class="settings-panel" aria-label="設定" hidden>
        <div class="settings-sheet">
          <div class="settings-head">
            <h2>Settings</h2>
            <button id="closeSettingsButton" class="close-button" type="button" aria-label="閉じる">x</button>
          </div>
          <div class="settings-tabs" role="tablist" aria-label="設定カテゴリ">
            <button id="gameSettingsTab" class="active" type="button" role="tab" aria-selected="true">GAME</button>
            <button id="playersSettingsTab" type="button" role="tab" aria-selected="false">PLAYERS</button>
            <button id="dataSettingsTab" type="button" role="tab" aria-selected="false">DATA</button>
          </div>
          <div id="gameSettingsPage" class="settings-page">
          <div class="setting-row">
            <span>Players</span>
            <div class="segmented-control" role="group" aria-label="プレイヤー数">
              <button id="mode1v1Button" type="button">1on1</button>
              <button id="mode2v2Button" type="button">2on2</button>
              <button id="mode3v3Button" type="button">3on3</button>
              <button id="mode5v5Button" type="button">5on5</button>
            </div>
          </div>
          <label class="slider-row">
            <span>Defense effect</span>
            <strong id="defenseValue">66%</strong>
            <input id="defenseSlider" type="range" min="0" max="100" value="66" />
          </label>
          <label class="slider-row">
            <span>Distance effect</span>
            <strong id="distanceValue">33%</strong>
            <input id="distanceSlider" type="range" min="0" max="100" value="33" />
          </label>
          <label class="slider-row">
            <span>Meter speed</span>
            <strong id="meterSpeedValue">66%</strong>
            <input id="meterSpeedSlider" type="range" min="0" max="100" value="66" />
          </label>
          <label class="slider-row">
            <span>Steal success</span>
            <strong id="stealSuccessValue">85%</strong>
            <input id="stealSuccessSlider" type="range" min="0" max="100" value="85" />
          </label>
          <label class="slider-row">
            <span>Character size</span>
            <strong id="characterSizeValue">50%</strong>
            <input id="characterSizeSlider" type="range" min="0" max="100" value="50" />
          </label>
          <label class="slider-row">
            <span>Move speed</span>
            <strong id="moveSpeedValue">25%</strong>
            <input id="moveSpeedSlider" type="range" min="0" max="100" value="25" />
          </label>
          <label class="slider-row">
            <span>Camera zoom</span>
            <strong id="cameraZoomValue">80%</strong>
            <input id="cameraZoomSlider" type="range" min="0" max="100" value="80" />
          </label>
          <label class="select-row">
            <span>Game time</span>
            <select id="gameTimeSelect">
              <option value="60">1:00</option>
              <option value="120">2:00</option>
              <option value="180" selected>3:00</option>
              <option value="300">5:00</option>
            </select>
          </label>
          <div class="preset-row">
            <span>Setting preset</span>
            <select id="presetSelect" aria-label="設定プリセット">
              <option value="0">Slot 1</option>
              <option value="1">Slot 2</option>
              <option value="2">Slot 3</option>
            </select>
            <div class="preset-actions">
              <button id="loadPresetButton" type="button">LOAD</button>
              <button id="savePresetButton" type="button">SAVE</button>
            </div>
          </div>
          <button id="resetSettingsButton" class="reset-button" type="button">RESET DEFAULTS</button>
          </div>
          <div id="playersSettingsPage" class="settings-page" hidden>
            <div id="rosterTeamControl" class="roster-team-control" role="group" aria-label="編集するチーム">
              <button type="button" data-roster-team="player" class="active">YOU</button>
              <button type="button" data-roster-team="cpu">CPU</button>
            </div>
            <div id="rosterPositionControl" class="roster-position-control" role="tablist" aria-label="ポジション"></div>
            <div id="rosterEditor" class="roster-editor"></div>
          </div>
          <div id="dataSettingsPage" class="settings-page" hidden>
            <p class="data-note">Export includes game settings, both rosters, and all preset slots.</p>
            <div class="data-actions">
              <button id="exportSettingsButton" type="button">EXPORT</button>
              <button id="importSettingsButton" type="button">IMPORT</button>
            </div>
            <input id="importSettingsInput" type="file" accept="application/json,.json" hidden />
          </div>
        </div>
      </section>
    </main>

    <script src="app.js?v=0.11.1"></script>
  </body>
</html>
